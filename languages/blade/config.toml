name = "Blade"
grammar = "blade"
path_suffixes = ["blade.php"]
line_comments = ["{{-- ", " --}}"]
block_comment = ["{{-- ", " --}}"]
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "{{", end = "}}", close = true, newline = true },
    { start = "{!!", end = "!!}", close = true, newline = true },
]
